<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务斩杀线风险评估 | Kill Line Risk Calculator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义动画 */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">财务斩杀线评估</h1>
            <div class="flex items-center space-x-4">
                <!-- 语言切换 (示意) -->
                <button class="text-sm text-gray-500 hover:text-blue-600">EN / 中文</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <!-- 1. 地区选择 -->
        <section class="mb-8">
            <h2 class="text-lg font-semibold mb-4">请选择您所在的地区</h2>
            <div class="grid grid-cols-2 gap-4">
                <button id="btn-hk" onclick="setRegion('HK')" 
                    class="p-4 border-2 rounded-xl text-center transition-all duration-300 border-blue-500 bg-blue-50 text-blue-700 font-bold shadow-md">
                    🇭🇰 香港 Hong Kong
                </button>
                <button id="btn-us" onclick="setRegion('US')" 
                    class="p-4 border-2 rounded-xl text-center transition-all duration-300 border-gray-200 hover:border-gray-300">
                    🇺🇸 美国 United States
                </button>
            </div>
        </section>

        <!-- 2. 表单区域 -->
        <section id="form-section" class="bg-white p-6 rounded-2xl shadow-lg mb-8 hidden">
            <h2 class="text-lg font-semibold mb-6 border-b pb-2">输入您的财务状况</h2>
            
            <form id="risk-form" class="space-y-6">
                
                <!-- 通用字段 (始终显示) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">月稳定收入 (Monthly Income)</label>
                        <input type="number" id="income" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., 25000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">月刚性支出 (Rigid Expenses)</label>
                        <input type="number" id="expenses" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., 15000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">现金储蓄 (Cash Savings)</label>
                        <input type="number" id="savings" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., 50000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">总债务 (Total Debt)</label>
                        <input type="number" id="debt" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., 100000">
                    </div>
                </div>

                <!-- 香港特有字段 -->
                <div id="hk-specific" class="space-y-4 border-t pt-4">
                    <h3 class="font-medium text-gray-800">香港地区专属选项</h3>
                    <div class="flex flex-wrap gap-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="hk-negative-equity" class="w-5 h-5 text-blue-600 rounded">
                            <span class="ml-2 text-sm">持有负资产物业 (Negative Equity)</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="hk-helper" class="w-5 h-5 text-blue-600 rounded">
                            <span class="ml-2 text-sm">雇佣外籍家庭佣工</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="hk-school" class="w-5 h-5 text-blue-600 rounded">
                            <span class="ml-2 text-sm">子女就读直资/国际学校</span>
                        </label>
                    </div>
                </div>

                <!-- 美国特有字段 -->
                <div id="us-specific" class="space-y-4 border-t pt-4 hidden">
                    <h3 class="font-medium text-gray-800">美国地区专属选项</h3>
                    <div class="flex flex-wrap gap-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="us-insurance" class="w-5 h-5 text-blue-600 rounded">
                            <span class="ml-2 text-sm">有医疗保险 (Medical Insurance)</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="us-unemployment" class="w-5 h-5 text-blue-600 rounded">
                            <span class="ml-2 text-sm">有失业保险 (Unemployment)</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-lg">
                    开始评估风险
                </button>
            </form>
        </section>

        <!-- 3. 结果展示区域 -->
        <section id="result-section" class="hidden fade-in">
            <div class="bg-white p-8 rounded-2xl shadow-xl text-center">
                <div id="result-icon" class="text-6xl mb-4">⚠️</div>
                <h2 id="result-title" class="text-2xl font-bold mb-2">风险评估结果</h2>
                <p id="result-desc" class="text-gray-600 mb-6">请填写表单以查看结果</p>
                
                <!-- 风险因素列表 -->
                <div id="risk-factors" class="text-left bg-gray-50 p-4 rounded-lg mb-6 hidden">
                    <h3 class="font-bold mb-2 text-red-600">🚨 主要风险触发点：</h3>
                    <ul id="factor-list" class="list-disc pl-5 space-y-1 text-sm text-gray-700">
                    </ul>
                </div>

                <button onclick="resetForm()" class="text-blue-600 font-medium hover:underline">重新评估</button>
            </div>
        </section>

    </main>

    <!-- 页脚 -->
    <footer class="text-center py-8 text-gray-400 text-sm">
        <p>⚠️ 免责声明：本工具仅供财务知识科普参考，不构成任何投资建议或财务诊断。</p>
        <p class="mt-1">© 2026 Kill Line Calculator Demo</p>
    </footer>

    <!-- 逻辑脚本 -->
    <script>
        let currentRegion = 'HK';

        // 1. 地区切换逻辑
        function setRegion(region) {
            currentRegion = region;
            const btnHk = document.getElementById('btn-hk');
            const btnUs = document.getElementById('btn-us');
            const formSection = document.getElementById('form-section');
            const hkFields = document.getElementById('hk-specific');
            const usFields = document.getElementById('us-specific');

            // 按钮样式重置
            btnHk.className = "p-4 border-2 rounded-xl text-center transition-all duration-300 border-gray-200 hover:border-gray-300";
            btnUs.className = "p-4 border-2 rounded-xl text-center transition-all duration-300 border-gray-200 hover:border-gray-300";

            // 激活选中样式
            if (region === 'HK') {
                btnHk.className = "p-4 border-2 rounded-xl text-center transition-all duration-300 border-blue-500 bg-blue-50 text-blue-700 font-bold shadow-md";
                hkFields.classList.remove('hidden');
                usFields.classList.add('hidden');
            } else {
                btnUs.className = "p-4 border-2 rounded-xl text-center transition-all duration-300 border-blue-500 bg-blue-50 text-blue-700 font-bold shadow-md";
                hkFields.classList.add('hidden');
                usFields.classList.remove('hidden');
            }

            formSection.classList.remove('hidden');
            formSection.classList.add('fade-in');
            document.getElementById('result-section').classList.add('hidden');
        }

        // 2. 核心计算逻辑 (移植之前的 Python 逻辑)
        function calculateRisk(data) {
            const factors = [];
            let level = "";
            let color = "";
            let icon = "";

            if (data.region === 'US') {
                if (data.savings < data.expenses * 3) factors.push("应急储蓄不足3个月刚性支出");
                if (data.savings < 400) factors.push("无法覆盖400美元意外开支");
                if (data.expenses / data.income > 0.7) factors.push("月度刚性支出占收入超70%");
                if (!data.hasMedical) factors.push("无稳定医保");
                if (!data.hasUnemployment) factors.push("无失业保险");

                if (factors.length >= 3) { level = "高风险 (已触及斩杀线)"; color = "red"; icon = "💀"; }
                else if (factors.length >= 1) { level = "中风险 (接近斩杀线)"; color = "yellow"; icon = "⚠️"; }
                else { level = "低风险 (安全)"; color = "green"; icon = "✅"; }
            } else {
                // HK Logic
                if (data.isNegativeEquity) factors.push("持有负资产物业");
                if (data.savings < data.expenses * 3) factors.push("应急储蓄不足3个月刚性支出");
                if (data.hasHelper) factors.push("需承担外籍家庭佣工开支");
                if (data.hasPrivateSchool) factors.push("需承担昂贵学费");
                if (data.expenses / data.income > 0.7) factors.push("月度刚性支出占收入超70%");

                if (data.isNegativeEquity && data.savings < data.expenses * 3) {
                    level = "高风险 (已触及斩杀线)"; color = "red"; icon = "💸";
                } else if (factors.length >= 2) {
                    level = "中风险 (接近斩杀线)"; color = "yellow"; icon = "⚠️";
                } else {
                    level = "低风险 (安全)"; color = "green"; icon = "✅";
                }
            }

            return { level, factors, color, icon };
        }

        // 3. 表单提交处理
        document.getElementById('risk-form').addEventListener('submit', function(e) {
            e.preventDefault();

            // 收集数据
            const formData = {
                region: currentRegion,
                income: parseFloat(document.getElementById('income').value),
                expenses: parseFloat(document.getElementById('expenses').value),
                savings: parseFloat(document.getElementById('savings').value),
                debt: parseFloat(document.getElementById('debt').value),
                // HK specific
                isNegativeEquity: document.getElementById('hk-negative-equity').checked,
                hasHelper: document.getElementById('hk-helper').checked,
                hasPrivateSchool: document.getElementById('hk-school').checked,
                // US specific
                hasMedical: document.getElementById('us-insurance').checked,
                hasUnemployment: document.getElementById('us-unemployment').checked
            };

            // 计算
            const result = calculateRisk(formData);

            // 渲染结果
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('result-icon').innerText = result.icon;
            document.getElementById('result-title').innerText = result.level;
            document.getElementById('result-title').className = `text-2xl font-bold mb-2 text-${result.color}-600`;
            
            const factorList = document.getElementById('factor-list');
            const factorDiv = document.getElementById('risk-factors');
            
            factorList.innerHTML = '';
            if (result.factors.length > 0) {
                factorDiv.classList.remove('hidden');
                result.factors.forEach(f => {
                    const li = document.createElement('li');
                    li.innerText = f;
                    factorList.appendChild(li);
                });
            } else {
                factorDiv.classList.add('hidden');
                document.getElementById('result-desc').innerText = "您的财务状况非常健康，请继续保持！";
            }

            // 滚动到结果
            document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
        });

        function resetForm() {
            document.getElementById('risk-form').reset();
            document.getElementById('result-section').classList.add('hidden');
        }
    </script>
</body>
</html>
